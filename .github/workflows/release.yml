name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check
        run: go vet ./...

      - name: Package plugin
        run: zip -r plugin.zip plugin.yaml plugin.go go.mod go.sum

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" plugin.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes

  submit-pr:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Submit PR to registry
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "REGISTRY_PAT not set, skipping"; exit 0; fi
          PLUGIN_ID="nuxtblog-plugin-telegram-notify"
          VERSION="${GITHUB_REF_NAME#v}"
          REGISTRY="nuxtblog/registry"
          BRANCH="update-${PLUGIN_ID}-${VERSION}"
          FILE="plugins/nuxtblog_${PLUGIN_ID}.json"
          TODAY=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REGISTRY}.git" registry
          cd registry

          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$FILE"
          sed -i "s/\"updated_at\": \".*\"/\"updated_at\": \"${TODAY}\"/" "$FILE"

          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "update ${PLUGIN_ID} to v${VERSION}"
          git push origin "$BRANCH"

          gh pr create --repo "$REGISTRY" \
            --head "$BRANCH" \
            --title "update ${PLUGIN_ID} to v${VERSION}" \
            --body "Automated release from [${PLUGIN_ID} ${GITHUB_REF_NAME}](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME})"
